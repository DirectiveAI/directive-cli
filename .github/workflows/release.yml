name: Release

# Publishes @directiveai/cli to npm. Triggered by pushing a v* tag
# (e.g. `git tag v0.0.2 && git push origin v0.0.2`) or manually from the
# Actions tab / API (workflow_dispatch). Both publish the version currently
# in package.json, so bump it first; npm rejects republishing a version.
# Requires an NPM_TOKEN repo secret (automation/granular token with publish
# rights on the @directiveai scope). --provenance needs id-token and a public repo.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
